    <style>

            height:100vh;

        .card{

        }

        p{
            color:#d1d5db;
            line-height:1.7;
            font-size:18px;
        }

        .status{
            margin-top:30px;
            font-size:22px;
            color:#22c55e;
            font-weight:bold;
        }

</head>

<div class="card">

</html>
